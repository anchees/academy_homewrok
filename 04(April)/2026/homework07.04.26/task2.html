<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="library">

        <h3>Inputs</h3>

        <input class="input" type="text" placeholder="Enter some text">
        <input class="input valid" type="text" value="valid text">
        <input class="input invalid" type="text" value="invalid text">

        <h3>Check boxes</h3>

        <label>
            <input type="checkbox" checked>
            Subscribe
        </label>

        <label>
            <input type="checkbox">
            Subscribe
        </label>

        <h3>Radio buttons</h3>

        <p>
            Gender:
            <label><input type="radio" name="gender" checked> Male</label>
            <label><input type="radio" name="gender"> Female</label>
        </p>

        <h3>Buttons</h3>

        <button class="btn green">Active</button>
        <button class="btn green">Hover</button>
        <button class="btn red">Danger</button>
        <button class="btn red">Hover</button>
        <button class="btn disabled" disabled>Disabled</button>
        <button class="circle green">+</button>
        <button class="circle red">-</button>

        <h3>Text area</h3>

        <textarea placeholder="Enter some text..."></textarea>

    </div>

</body>
</html>
