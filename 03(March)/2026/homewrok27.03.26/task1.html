<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task 1</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            font-size: 18px;
        }

        .products {
            width: 700px;
            margin: 30px auto;
            padding: 20px;
            border: 1px solid #cccccc;
            text-align: center;
        }

        .product {
            display: inline-block;
            width: 120px;
            height: 140px;
            border: 1px solid #cccccc;
            border-radius: 15px;
            margin: 8px;
            padding: 10px;
            vertical-align: top;
        }

        .icon {
            font-size: 55px;
        }

        .name {
            font-weight: bold;
            font-size: 13px;
            margin-top: 10px;
        }

        .end {
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="products">
        <h2>What do I have in my fridge?</h2>

        <div class="product">
            <div class="icon">🫑</div>
            <div class="name">Pepper</div>
        </div>

        <div class="product">
            <div class="icon">🍎</div>
            <div class="name">Apple</div>
        </div>

        <div class="product">
            <div class="icon">🧀</div>
            <div class="name">Cheese</div>
        </div>

        <div class="product">
            <div class="icon">🌽</div>
            <div class="name">Corn</div>
        </div>

        <div class="product">
            <div class="icon">🍄</div>
            <div class="name">Mushroom</div>
        </div>

        <div class="product">
            <div class="icon">🧄</div>
            <div class="name">Garlic</div>
        </div>

        <div class="product">
            <div class="icon">🥩</div>
            <div class="name">Beef</div>
        </div>

        <div class="product">
            <div class="icon">🐟</div>
            <div class="name">Fish</div>
        </div>

        <div class="product">
            <div class="icon">🍳</div>
            <div class="name">Eggs</div>
        </div>

        <div class="product">
            <div class="icon">🌿</div>
            <div class="name">Coriander</div>
        </div>

        <hr>

        <div class="end">... that's all ...</div>
    </div>

</body>
</html>
