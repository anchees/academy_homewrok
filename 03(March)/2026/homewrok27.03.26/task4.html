<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task 4</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        footer {
            width: 800px;
            margin: 50px auto;
            background-color: #28506d;
            color: white;
            padding: 35px;
        }

        .column {
            display: inline-block;
            width: 220px;
            vertical-align: top;
        }

        .column a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 8px;
            font-size: 14px;
        }

        .column a:hover {
            text-decoration: underline;
        }

        .social {
            display: inline-block;
            width: 220px;
            vertical-align: top;
            text-align: center;
        }

        .icon {
            display: inline-block;
            width: 35px;
            height: 35px;
            background-color: #aaaaaa;
            color: white;
            line-height: 35px;
            text-align: center;
            border-radius: 5px;
            margin: 10px;
            font-weight: bold;
        }

        .icon:hover {
            background-color: red;
        }

        hr {
            border: 1px solid #6f91a8;
        }

        .copy {
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <footer>
        <div class="column">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">News</a>
        </div>

        <div class="column">
            <a href="#">Blog</a>
            <a href="#">FAQ</a>
            <a href="#">Contacts</a>
            <a href="#">Privacy & cookies</a>
        </div>

        <div class="social">
            <span class="icon">f</span>
            <span class="icon">📷</span>
            <span class="icon">▶</span>
        </div>

        <hr>

        <div class="copy">
            Copyright © Company 2018 - 2019
        </div>
    </footer>

</body>
</html>
