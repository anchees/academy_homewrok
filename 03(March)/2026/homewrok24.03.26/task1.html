<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task 1</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .fruits {
            background-color: #f5a3b5;
            padding: 25px;
            margin: 30px;
            width: 600px;
        }

        .fruits li {
            background-color: #c65d73;
            color: white;
            margin: 10px;
            padding: 10px;
            list-style-position: inside;
        }

        .fruits span {
            background-color: #9f2644;
            padding: 10px 25px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <ol class="fruits">
        <li><span>Apple</span></li>
        <li><span>Orange</span></li>
        <li><span>Pineapple</span></li>
        <li><span>Pear</span></li>
        <li><span>Cherry</span></li>
    </ol>

</body>
</html>
